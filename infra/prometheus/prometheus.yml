global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: amir-erp
    author: amir-saoudi

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: amir-erp-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: backend
