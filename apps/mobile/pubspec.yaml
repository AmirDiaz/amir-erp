name: amir_erp
description: Amir ERP — Modern multi-tenant SaaS ERP universal client. Author Amir Saoudi.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # state, navigation, di
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # http + storage
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # i18n / RTL
  intl: ^0.20.2

  # design + utils
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  uuid: ^4.5.1
  collection: ^1.18.0
  package_info_plus: ^8.1.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/
    - assets/i18n/
